<h1>How Are You Feeling Today?</h1>
<form method="POST">
    <textarea name="user_input" placeholder="Tell me how you're feeling..." rows="4" cols="50"></textarea><br>
    <button type="submit">Submit</button>
</form>
{% if response %}
<p><strong>Your Emotion:</strong> {{ emotion }}</p>
<p><strong>Response:</strong> {{ response }}</p>
{% endif %}
<a href="{{ url_for('home') }}">Back to Home</a>
