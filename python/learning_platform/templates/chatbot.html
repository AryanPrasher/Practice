<!DOCTYPE html>
<html>
<head>
    <title>Chatbot - Learning Platform</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>Chatbot</h1>
        <form method="POST">
            <textarea name="user_input" placeholder="Ask me anything..." rows="4" cols="50"></textarea><br>
            <button type="submit">Send</button>
        </form>
        {% if response %}
        <p><strong>Bot Response:</strong> {{ response }}</p>
        {% endif %}
        <a href="{{ url_for('home') }}">Back to Home</a>
    </div>
</body>
</html>
